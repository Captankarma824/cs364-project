<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terraria Database</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #1e1e2f;
    color: #f5f5f5;
}

/* Top Navbar */
.navbar {
    background-color: #2a2a40;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.navbar h1 {
    margin: 0;
    font-size: 20px;
}

.navbar a {
    color: #f5f5f5;
    margin-left: 20px;
    text-decoration: none;
}

.navbar a:hover {
    color: #4CAF50;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 200px;
    background-color: #2a2a40;
    padding: 20px;
    height: 100vh;
}

.sidebar a {
    display: block;
    margin: 10px 0;
    color: #f5f5f5;
    text-decoration: none;
}

.sidebar a:hover {
    color: #4CAF50;
}

/* Main Content */
.main {
    flex: 1;
    padding: 20px;
}

/* Cards */
.card {
    background-color: #2a2a40;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    text-align: left;
}

th {
    background-color: #3a3a5a;
}

tr:nth-child(even) {
    background-color: #25253a;
}

tr:hover {
    background-color: #3a3a5a;
}

/* Buttons */
button {
    background-color: #4CAF50;
    border: none;
    padding: 8px 12px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h1>Terraria DB</h1>
    
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">Players</a>
        <a href="#">Classes</a>
        <a href="#">Locations</a>
        <a href="#">Enemies</a>
        <a href="#">Queries</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Players Table -->
        <div class="card" id = "playerDiv">
            <h2>Players</h2>
            <button>Add Player</button>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Health</th>
                    <th>Mana</th>
                    <th>Class</th>
                    <th>Location</th>
                    <th>Actions</th>
                </tr>

                <tr>
                    <td>1</td>
                    <td>100</td>
                    <td>50</td>
                    <td>Warrior</td>
                    <td>Forest</td>
                    <td>
                        <button>Edit</button>
                        <button>Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>80</td>
                    <td>120</td>
                    <td>Mage</td>
                    <td>Dungeon</td>
                    <td>
                        <button>Edit</button>
                        <button>Delete</button>
                    </td>
                </tr>
            </table>
        </div>

        <!-- Enemies Section -->
        <div class="card" id = "enemiesDiv">
            <h2>Enemies</h2>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Health</th>
                    <th>Damage</th>
                    <th>Loot</th>
                    <th>Location</th>
                    <th>Time</th>
                </tr>

                <tr>
                    <td>101</td>
                    <td>50</td>
                    <td>10</td>
                    <td>Gel</td>
                    <td>Forest</td>
                    <td>Day</td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>120</td>
                    <td>25</td>
                    <td>Bone</td>
                    <td>Dungeon</td>
                    <td>Night</td>
                </tr>
            </table>
        </div>

        <!-- Query Section -->
        <div class="card" id = "queriesDiv">
            <h2>Run Query</h2>

            <select>
                <option>Enemies at Night</option>
                <option>Strongest Enemy</option>
                <option>Enemies in Player Location</option>
            </select>

            <button>Run</button>
        </div>

    </div>

</div>

</body>
</html>
